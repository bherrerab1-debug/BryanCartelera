<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Películas - PopCinema</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        /* Zona de Filtros */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .controls input, .controls select {
            background-color: var(--bg-color);
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            min-width: 200px;
            transition: border-color 0.3s;
        }

        .controls input:focus, .controls select:focus {
            border-color: var(--accent);
        }

        /* Grid de películas */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* Tarjeta de Película */
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .poster-container {
            width: 100%;
            height: 340px;
            overflow: hidden;
            background-color: #020617;
            position: relative;
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.05);
        }

        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-active { background-color: var(--success); color: #fff; }
        .status-inactive { background-color: var(--danger); color: #fff; }
        .status-unknown { background-color: var(--text-muted); color: #fff; }

        .movie-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.3;
            color: var(--text-main);
        }

        .movie-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: auto;
            display: flex;
            justify-content: space-between;
        }

        .movie-type {
            background-color: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: capitalize;
        }

        /* Ventana Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 17, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--card-bg);
            max-width: 700px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: var(--text-main);
            cursor: pointer;
            z-index: 10;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 600px) {
            .modal-body { flex-direction: row; }
            .modal-img { width: 40%; }
            .modal-details { width: 60%; }
        }

        .modal-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 300px;
        }

        .modal-details {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-details h2 { font-size: 1.8rem; }
        .modal-desc { color: var(--text-muted); line-height: 1.5; font-size: 0.95rem;}
        .modal-item-info { font-size: 0.9rem; }
        .modal-item-info strong { color: var(--accent); }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍿 PopCinema Catálogo</h1>
        <div class="controls">
            <input type="text" id="search-input" placeholder="Buscar por título...">
            <select id="genre-filter">
                <option value="">Todos los géneros</option>
            </select>
            <select id="ubication-filter">
                <option value="">Todas las ubicaciones</option>
            </select>
        </div>
    </header>

    <main>
        <div class="movies-grid" id="movies-container">
            </div>
    </main>

    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="modal-body" id="modal-body-content">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
